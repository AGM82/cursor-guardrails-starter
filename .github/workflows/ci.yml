name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege by default; jobs opt into more only if they need it.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest
    # Job-level permissions replace the workflow-level block above rather than
    # merging with it, so contents: read must be repeated here alongside the
    # two extra scopes attest-build-provenance needs for keyless (OIDC) signing.
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Check runtime
        run: |
          npm run check:runtime
          node .github/scripts/check-runtime.mjs --self-test
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test -- --coverage
      - name: Build
        run: npm run build
      - name: Attest build provenance
        # Only on push to main: a signed provenance record is only meaningful
        # for the artefact that actually ships. PR runs (fork or not) also
        # can't reliably obtain the OIDC token this step needs.
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'dist/**'
      - name: Dependency audit
        run: npm audit --audit-level=high
      - name: Verify package signatures
        run: npm audit signatures
      - name: Check guardrail manifest drift
        run: node .github/scripts/check-manifest-drift.mjs
      - name: Audit hook self-test
        run: node .cursor/hooks/audit.mjs --self-test

  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
      - name: Generate SBOM
        # --package-lock-only reads package-lock.json directly instead of
        # walking node_modules via `npm ls`. --ignore-npm-errors tolerates the
        # pre-existing eslint-plugin-jsx-a11y / eslint@10 peer-dependency
        # mismatch documented in 40-tooling-supply-chain.mdc (npm ls flags it
        # as "invalid" from the lockfile's own peer-dependency metadata, not
        # from node_modules — the mismatch is real but already a known,
        # accepted risk, not something this job should fail on).
        run: npx @cyclonedx/cyclonedx-npm@5.0.0 --package-lock-only --ignore-npm-errors --output-format JSON --output-file sbom.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: gitleaks
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect --source=/repo --redact --no-banner --exit-code 1

  sast:
    name: SAST (Semgrep OWASP Top Ten)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.168.0@sha256:59fbed6127ea7c5dde3ba6a85142733bb20ea9aaa36120c953904f1539aaf66e
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: semgrep scan
        run: semgrep scan --config p/owasp-top-ten --error --quiet
